services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-consultation-web
    ports:
      - "8080:80"
    depends_on:
      - backend
      - redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-consultation-backend
    environment:
      DATABASE_URL: postgresql://student_consultation:student_consultation@postgres:5432/student_consultation
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: student-consultation-postgres
    environment:
      POSTGRES_DB: student_consultation
      POSTGRES_USER: student_consultation
      POSTGRES_PASSWORD: student_consultation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: student-consultation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
