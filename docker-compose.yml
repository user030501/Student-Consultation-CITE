services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-consultation-web
    ports:
      - "8080:80"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: student-consultation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
