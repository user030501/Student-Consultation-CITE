services:
  web:
    image: student-consultation-cite-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE_URL: /api
    container_name: student-consultation-web
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: student-consultation-cite-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-consultation-backend
    environment:
      DATABASE_URL: postgresql://student_consultation:student_consultation@postgres:5432/student_consultation
      REDIS_URL: redis://redis:6379
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: student-consultation-postgres
    environment:
      POSTGRES_DB: student_consultation
      POSTGRES_USER: student_consultation
      POSTGRES_PASSWORD: student_consultation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_consultation -d student_consultation"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: student-consultation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
  redis_data:
